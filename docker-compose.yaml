services:

  kinesis:
    image: hectorvent/floci:1.5.4
    restart: always
    ports:
      - 4566:4566
  redis:
    image: redis:latest
    restart: always
    ports:
      - 16379:6379

  test:
     container_name: async-kinesis-test
     command: ['pytest', '-v', '--cov=kinesis', '-m', 'not dynamodb']
     volumes:
      - ./tests:/app/tests
      - ./kinesis:/app/kinesis
      - ./pytest.ini:/app/pytest.ini
     build:
       context: .
       dockerfile: Dockerfile
     environment:
      - AWS_DEFAULT_REGION=ap-southeast-2
      - ENDPOINT_URL=http://kinesis:4566
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
     depends_on:
      - kinesis
      - redis
